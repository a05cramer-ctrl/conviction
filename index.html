<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$CONVICTION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #C9A84C;
      --gold-light:  #e8c96a;
      --gold-dim:    rgba(201,168,76,0.18);
      --white:       #ffffff;
      --dark:        rgba(0,0,0,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    body {
      font-family: 'Inter', sans-serif;
      color: var(--white);
      background: #000;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('bg.png') center center / cover no-repeat;
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.62) 0%,
        rgba(0,0,0,0.48) 40%,
        rgba(0,0,0,0.70) 100%
      );
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 4;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      flex-shrink: 0;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-shadow: 0 0 18px rgba(201,168,76,0.5);
    }

    .btn-buy-nav {
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white);
      background: transparent;
      border: 1.5px solid var(--gold);
      padding: 9px 22px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s, color .2s, box-shadow .2s;
      text-decoration: none;
    }
    .btn-buy-nav:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(201,168,76,0.45);
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      gap: 0;
    }

    .hero-ticker {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 11rem);
      line-height: 1;
      letter-spacing: 6px;
      color: var(--white);
      text-shadow:
        0 0 30px rgba(201,168,76,0.55),
        0 0 80px rgba(201,168,76,0.25),
        0 2px 12px rgba(0,0,0,0.8);
      animation: glow 3.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow:
          0 0 30px rgba(201,168,76,0.55),
          0 0 80px rgba(201,168,76,0.25),
          0 2px 12px rgba(0,0,0,0.8);
      }
      50% {
        text-shadow:
          0 0 50px rgba(201,168,76,0.8),
          0 0 120px rgba(201,168,76,0.4),
          0 2px 12px rgba(0,0,0,0.8);
      }
    }

    .hero-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(.95rem, 2.2vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.82);
      margin-top: 14px;
      text-transform: uppercase;
    }

    /* ── CTA BUTTONS ── */
    .cta-group {
      display: flex;
      gap: 16px;
      margin-top: 38px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-cta {
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      background: rgba(0,0,0,0.55);
      border: 1.5px solid var(--gold);
      padding: 14px 34px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .15s;
      backdrop-filter: blur(4px);
    }
    .btn-cta:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 28px rgba(201,168,76,0.55);
      transform: translateY(-2px);
    }
    .btn-cta:active { transform: translateY(0); }

    .btn-cta.secondary {
      border-color: rgba(255,255,255,0.4);
    }
    .btn-cta.secondary:hover {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border-color: rgba(255,255,255,0.8);
      box-shadow: 0 0 20px rgba(255,255,255,0.12);
    }

    /* ── CONTRACT ADDRESS ── */
    .ca-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 20px 24px 28px;
    }

    .ca-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 50px;
      padding: 11px 22px;
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      max-width: 100%;
    }
    .ca-inner:hover {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(201,168,76,0.25);
    }

    .ca-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }

    .ca-address {
      font-size: .8rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: .5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }

    .ca-copy-icon {
      font-size: .8rem;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
      transition: color .2s;
    }
    .ca-inner:hover .ca-copy-icon { color: var(--gold); }

    .ca-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--gold);
      color: #000;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    .ca-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── RAIN CANVAS ── */
    #rain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── FOG ── */
    .fog-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52vh;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .smoke {
      position: absolute;
      border-radius: 50%;
      filter: blur(38px);
      will-change: transform, opacity;
    }

    /* Layer A — wide slow base, drifts left→right */
    .smoke-a {
      width: 90vw; height: 28vh;
      bottom: -4vh; left: -10vw;
      background: radial-gradient(ellipse at 50% 80%,
        rgba(220,220,230,0.18) 0%,
        rgba(200,200,215,0.08) 55%,
        transparent 100%);
      animation: drift-a 20s ease-in-out infinite;
    }
    .smoke-a2 {
      width: 80vw; height: 22vh;
      bottom: -2vh; left: 20vw;
      background: radial-gradient(ellipse at 50% 80%,
        rgba(210,210,225,0.14) 0%,
        rgba(190,190,210,0.06) 55%,
        transparent 100%);
      animation: drift-a 28s ease-in-out infinite reverse;
    }

    /* Layer B — mid-height puffs drifting opposite */
    .smoke-b {
      width: 65vw; height: 20vh;
      bottom: 6vh; left: -5vw;
      background: radial-gradient(ellipse at 50% 70%,
        rgba(230,230,240,0.13) 0%,
        rgba(200,210,220,0.05) 60%,
        transparent 100%);
      animation: drift-b 16s ease-in-out infinite;
    }
    .smoke-b2 {
      width: 55vw; height: 18vh;
      bottom: 8vh; right: -5vw;
      background: radial-gradient(ellipse at 50% 70%,
        rgba(225,225,238,0.12) 0%,
        rgba(200,205,218,0.05) 60%,
        transparent 100%);
      animation: drift-b 22s ease-in-out infinite 4s reverse;
    }

    /* Layer C — thin wisps near the very bottom */
    .smoke-c {
      width: 100vw; height: 14vh;
      bottom: 0; left: 0;
      background: linear-gradient(to top,
        rgba(240,240,248,0.16) 0%,
        rgba(230,230,245,0.07) 50%,
        transparent 100%);
      animation: drift-c 12s ease-in-out infinite;
    }

    @keyframes drift-a {
      0%   { transform: translateX(0)    scaleY(1);    opacity: 1;   }
      40%  { transform: translateX(6vw)  scaleY(1.08); opacity: .85; }
      70%  { transform: translateX(12vw) scaleY(0.96); opacity: .95; }
      100% { transform: translateX(0)    scaleY(1);    opacity: 1;   }
    }
    @keyframes drift-b {
      0%   { transform: translateX(0)     scaleX(1);    opacity: 1;   }
      50%  { transform: translateX(-8vw)  scaleX(1.1);  opacity: .8;  }
      100% { transform: translateX(0)     scaleX(1);    opacity: 1;   }
    }
    @keyframes drift-c {
      0%   { transform: translateX(0);   opacity: .9; }
      50%  { transform: translateX(4vw); opacity: .7; }
      100% { transform: translateX(0);   opacity: .9; }
    }

    /* ── LIGHTNING ── */
    #lightning {
      position: fixed;
      inset: 0;
      z-index: 3;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    /* ── MOBILE ── */
    @media (max-width: 500px) {
      nav { padding: 16px 20px; }
      .hero-ticker { letter-spacing: 2px; }
      .btn-cta { padding: 12px 24px; font-size: .8rem; }
      .ca-address { max-width: 180px; font-size: .72rem; }
      .ca-inner { padding: 9px 16px; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- RAIN -->
<canvas id="rain"></canvas>

<!-- FOG / SMOKE -->
<div class="fog-wrap">
  <div class="smoke smoke-c"></div>
  <div class="smoke smoke-a"></div>
  <div class="smoke smoke-a2"></div>
  <div class="smoke smoke-b"></div>
  <div class="smoke smoke-b2"></div>
</div>

<!-- LIGHTNING -->
<div id="lightning"></div>

<div class="page">

  <!-- NAV -->
  <nav>
    <div class="nav-logo">$CONVICTION</div>
    <a href="#" class="btn-buy-nav">Buy Now</a>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-ticker">CONVICTION</div>
    <div class="hero-tagline">When everyone sells. You hold.</div>
    <div class="cta-group">
      <a href="#" class="btn-cta">Buy $CONVICTION</a>
      <a href="https://twitter.com" target="_blank" class="btn-cta secondary">Twitter</a>
    </div>
  </div>

  <!-- CONTRACT ADDRESS -->
  <div class="ca-bar">
    <div class="ca-inner" onclick="copyCA()">
      <span class="ca-label">CA</span>
      <span class="ca-address" id="caText">CA SOON</span>
      <span class="ca-copy-icon">⧉</span>
    </div>
  </div>

</div>

<div class="ca-toast" id="toast">Copied to clipboard</div>

<script>
  /* ── COPY CA ── */
  function copyCA() {
    const addr = document.getElementById('caText').textContent.trim();
    navigator.clipboard.writeText(addr).catch(() => {
      const el = document.createElement('textarea');
      el.value = addr;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    });
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  /* ── RAIN ── */
  (function () {
    const canvas = document.getElementById('rain');
    const ctx    = canvas.getContext('2d');
    const DROPS  = 200;
    let drops = [], W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function mkDrop() {
      return {
        x:     Math.random() * W,
        y:     Math.random() * H,
        len:   Math.random() * 22 + 14,
        speed: Math.random() * 4 + 3,
        op:    Math.random() * 0.25 + 0.15,
        thick: Math.random() * 0.8 + 0.5,
      };
    }

    function init() { resize(); drops = Array.from({ length: DROPS }, mkDrop); }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const d of drops) {
        const dx = d.len * 0.22;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + dx, d.y + d.len);
        ctx.strokeStyle = `rgba(180,185,200,${d.op})`;
        ctx.lineWidth   = d.thick;
        ctx.stroke();

        d.x += d.speed * 0.22;
        d.y += d.speed;

        if (d.y > H + 30) {
          d.x     = Math.random() * (W + 60) - 30;
          d.y     = -30;
          d.len   = Math.random() * 22 + 14;
          d.speed = Math.random() * 4 + 3;
          d.op    = Math.random() * 0.25 + 0.15;
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); drops = Array.from({ length: DROPS }, mkDrop); });
    init();
    draw();
  })();

  /* ── LIGHTNING ── */
  (function () {
    const el = document.getElementById('lightning');

    function flash() {
      const delay = 10000 + Math.random() * 5000;
      setTimeout(() => {
        el.style.transition = 'none';
        el.style.opacity    = '0.06';
        setTimeout(() => {
          el.style.transition = 'opacity 80ms ease-out';
          el.style.opacity    = '0';
          flash();
        }, 100);
      }, delay);
    }

    flash();
  })();
</script>

</body>
</html>
